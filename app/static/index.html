<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phi RAG Chatbot</title>
  <style>
    :root {
      --sidebar-w: 260px;
      --accent: #dd6b20;
      --accent-2: #b45309;
      --ink: #2e261f;
      --muted: #7a6550;
      --border: #f1d7bd;
      --chat-bg: #fdf6ec;
      --sidebar-bg: #231508;
      --sidebar-border: rgba(255,255,255,0.07);
      --sidebar-text: #f0e0cc;
      --sidebar-muted: #9a7a5a;
      --sidebar-hover: rgba(255,255,255,0.06);
      --sidebar-active-bg: rgba(221,107,32,0.18);
      --sidebar-active-border: #dd6b20;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      display: flex;
      background: var(--sidebar-bg);
    }

    /* ─── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }

    .sidebar-logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--sidebar-text);
      letter-spacing: 0.2px;
    }

    .sidebar-tagline {
      margin-top: 3px;
      font-size: 0.72rem;
      color: var(--sidebar-muted);
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: calc(100% - 24px);
      margin: 12px 12px 4px;
      padding: 9px 14px;
      background: var(--accent);
      color: #fff;
      border: 0;
      border-radius: 10px;
      font: inherit;
      font-size: 0.87rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 120ms;
      flex-shrink: 0;
    }
    .new-chat-btn:hover { filter: brightness(1.12); }
    .new-chat-btn:disabled { opacity: 0.55; cursor: default; }

    .sessions-heading {
      padding: 12px 16px 5px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--sidebar-muted);
      flex-shrink: 0;
    }

    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .sessions-list::-webkit-scrollbar { width: 4px; }
    .sessions-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .session-tab {
      padding: 9px 10px;
      border-radius: 8px;
      margin-bottom: 2px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 100ms;
    }
    .session-tab:hover { background: var(--sidebar-hover); }
    .session-tab.active {
      background: var(--sidebar-active-bg);
      border-left-color: var(--sidebar-active-border);
    }

    .session-tab-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--sidebar-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-tab.active .session-tab-title { color: #ffd0a0; }

    .session-tab-time {
      margin-top: 2px;
      font-size: 0.71rem;
      color: var(--sidebar-muted);
    }

    .sessions-empty {
      padding: 18px 10px;
      font-size: 0.8rem;
      color: var(--sidebar-muted);
      text-align: center;
    }

    /* ─── SIDEBAR BOTTOM ACTIONS ─────────────────── */
    .sidebar-footer {
      flex-shrink: 0;
      padding: 8px 12px 14px;
      border-top: 1px solid var(--sidebar-border);
      display: flex;
      gap: 6px;
    }

    .footer-btn {
      flex: 1;
      padding: 6px 4px;
      background: transparent;
      color: var(--sidebar-muted);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      font: inherit;
      font-size: 0.73rem;
      cursor: pointer;
      transition: all 120ms;
    }
    .footer-btn:hover { background: rgba(255,255,255,0.07); color: var(--sidebar-text); }

    /* ─── MAIN AREA ──────────────────────────────── */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--chat-bg);
      animation: fadein 300ms ease;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    .main-header {
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 20px 12px;
      background: linear-gradient(90deg, #fff3e6, #ffe8cc);
      border-bottom: 1px solid var(--border);
    }

    .main-title {
      font-size: 0.98rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
    }

    .main-meta {
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ─── CHAT THREAD ────────────────────────────── */
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: #e8c9aa transparent;
    }
    .chat-thread::-webkit-scrollbar { width: 5px; }
    .chat-thread::-webkit-scrollbar-thumb { background: #e8c9aa; border-radius: 4px; }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      padding: 60px 20px;
      text-align: center;
    }
    .chat-empty-icon { font-size: 2.8rem; opacity: 0.35; }
    .chat-empty-title { font-size: 1rem; font-weight: 600; color: var(--ink); opacity: 0.5; }
    .chat-empty-hint { font-size: 0.82rem; opacity: 0.55; }

    .turn { display: flex; flex-direction: column; gap: 8px; }

    .bubble-q {
      align-self: flex-end;
      max-width: 68%;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
      padding: 10px 15px;
      border-radius: 18px 18px 4px 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(180,83,9,0.18);
    }

    .bubble-a {
      align-self: flex-start;
      max-width: 78%;
      background: #fff;
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 4px 18px 18px 18px;
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .bubble-a.thinking { color: var(--muted); font-style: italic; }
    .bubble-a.error { color: #b83232; background: #fff5f5; border-color: #f5c0c0; font-style: italic; }

    .bubble-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 0 3px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .source-tag {
      background: #fff3e6;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 0.71rem;
      font-weight: 700;
      color: var(--accent-2);
    }

    /* ─── INPUT BAR ──────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 20px 16px;
      background: #fff;
      border-top: 1px solid var(--border);
    }

    .model-select {
      flex-shrink: 0;
      height: 44px;
      min-width: 220px;
      padding: 0 10px;
      font: inherit;
      font-size: 0.84rem;
      color: var(--ink);
      background: #fffdf9;
      border: 1px solid #e8c9aa;
      border-radius: 12px;
      outline: none;
    }
    .model-select:focus { border-color: var(--accent); }

    .model-picker {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .model-picker-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-left: 2px;
    }

    .composer-tools {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px 6px;
      background: #fff;
      border-top: 1px solid var(--border);
    }

    .attach-btn {
      height: 34px;
      padding: 0 12px;
      border: 1px solid #e8c9aa;
      border-radius: 10px;
      background: #fff6ea;
      color: var(--accent-2);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .upload-status {
      font-size: 0.72rem;
      color: var(--muted);
      min-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .upload-status.ok { color: #2f855a; }
    .upload-status.err { color: #b83232; }

    .attached-docs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 24px;
      max-width: 44vw;
      overflow: hidden;
    }

    .attached-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff8ef;
      font-size: 0.74rem;
      color: var(--ink);
      max-width: 220px;
    }

    .attached-chip-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attached-chip-remove {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.82rem;
      line-height: 1;
      padding: 0;
    }

    .input-textarea {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      padding: 10px 14px;
      font: inherit;
      font-size: 0.91rem;
      line-height: 1.5;
      background: #fffdf9;
      border: 1px solid #e8c9aa;
      border-radius: 12px;
      resize: none;
      overflow-y: auto;
      outline: none;
      transition: border-color 120ms;
    }
    .input-textarea:focus { border-color: var(--accent); }

    .ask-btn {
      flex-shrink: 0;
      height: 44px;
      padding: 0 22px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-size: 0.91rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms, filter 120ms;
    }
    .ask-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .ask-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 680px) {
      .sidebar { width: 200px; min-width: 200px; }
      .bubble-q, .bubble-a { max-width: 88%; }
      .model-select { min-width: 140px; }
      .attached-docs { max-width: 34vw; }
    }
    @media (max-width: 480px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%; height: auto; min-width: 0;
        border-right: 0; border-bottom: 1px solid var(--sidebar-border);
        flex-direction: row; flex-wrap: wrap;
      }
      .sessions-list { max-height: 90px; }
      .main { height: 0; flex: 1; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Phi RAG Chatbot</div>
      <div class="sidebar-tagline">phi4-mini · mxbai-embed-large</div>
    </div>

    <button id="newChatBtn" class="new-chat-btn">＋ New Chat</button>

    <div class="sessions-heading">Chats</div>
    <div class="sessions-list" id="sessionsList">
      <div class="sessions-empty">No chats yet.</div>
    </div>

    <div class="sidebar-footer">
      <button id="clearHistoryBtn" class="footer-btn">🗑 Clear</button>
      <button id="refreshBtn" class="footer-btn">↺ Refresh</button>
    </div>
  </aside>

  <!-- ── MAIN CHAT AREA ── -->
  <main class="main">
    <div class="main-header">
      <div class="main-title" id="mainTitle">New Chat</div>
      <div class="main-meta" id="mainMeta"></div>
    </div>

    <div class="chat-thread" id="chatThread">
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-title">Start a conversation</div>
        <div class="chat-empty-hint">Upload a document first, then ask questions below.</div>
      </div>
    </div>

    <div class="composer-tools">
      <button id="attachBtn" class="attach-btn">Attach Document</button>
      <input id="docFile" type="file" accept=".pdf,.docx,.txt,.md" style="display:none" />
      <div id="attachedDocs" class="attached-docs"></div>
      <div id="uploadStatus" class="upload-status"></div>
    </div>

    <div class="input-bar">
      <textarea id="question" class="input-textarea" rows="1" placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"></textarea>
      <div class="model-picker">
        <div class="model-picker-label">Model</div>
        <select id="modelSelect" class="model-select" title="Chat model"></select>
      </div>
      <button id="askBtn" class="ask-btn">Ask</button>
    </div>
  </main>

  <script>
    // ── DOM refs ──────────────────────────────────────
    const newChatBtn      = document.getElementById('newChatBtn');
    const askBtn          = document.getElementById('askBtn');
    const attachBtn       = document.getElementById('attachBtn');
    const docFile         = document.getElementById('docFile');
    const attachedDocs    = document.getElementById('attachedDocs');
    const uploadStatus    = document.getElementById('uploadStatus');
    const question        = document.getElementById('question');
    const chatThread      = document.getElementById('chatThread');
    const sessionsList    = document.getElementById('sessionsList');
    const mainTitle       = document.getElementById('mainTitle');
    const mainMeta        = document.getElementById('mainMeta');
    const modelSelect     = document.getElementById('modelSelect');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const refreshBtn      = document.getElementById('refreshBtn');

    // ── State ─────────────────────────────────────────
    let currentChatId = null;
    let cachedSessions = [];
    let historyRequestId = 0;
    let historyController = null;
    let uploadPending = false;
    let chatPending = false;
    let suppressThreadRender = false;
    let defaultModel = '';
    let draftAttachments = [];
    const attachmentsByChat = new Map();

    function sleep(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    attachBtn.addEventListener('click', () => docFile.click());

    // ── Utilities ─────────────────────────────────────
    function setBusy(btn, busy, busyLabel, idleLabel) {
      btn.disabled = busy;
      btn.textContent = busy ? busyLabel : idleLabel;
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function fetchJson(url, options = {}, timeoutMs = 15000) {
      const ctrl = new AbortController();
      const tid = window.setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: ctrl.signal });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        return data;
      } catch (err) {
        if (err.name === 'AbortError') throw new Error('Request timed out.');
        throw err;
      } finally {
        window.clearTimeout(tid);
      }
    }

    function timeAgo(isoStr) {
      const diff = Date.now() - new Date(isoStr).getTime();
      if (isNaN(diff) || diff < 0) return '';
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    function renderModelOptions(models, selected) {
      const safeModels = Array.isArray(models) ? models : [];
      const selectedModel = selected || safeModels[0] || '';
      modelSelect.innerHTML = safeModels
        .map((m) => {
          const name = escapeHtml(m.name || '');
          const installed = m.installed ? '' : ' (not installed)';
          const chosen = (m.name === selectedModel) ? ' selected' : '';
          return `<option value="${name}"${chosen}>${name}${installed}</option>`;
        })
        .join('');
    }

    async function loadModelOptions() {
      try {
        const payload = await fetchJson('/models', {}, 12000);
        const models = payload.models || [];
        defaultModel = payload.default_model || '';
        renderModelOptions(models, defaultModel);
      } catch (err) {
        renderModelOptions([
          { name: 'phi4-mini:3.8b-q4_K_M', installed: true },
          { name: 'qwen2.5:3b-instruct-q4_K_M', installed: true },
          { name: 'qwen2.5:1.5b', installed: true },
        ], 'phi4-mini:3.8b-q4_K_M');
      }
    }

    function getActiveAttachments() {
      if (!currentChatId) return draftAttachments;
      return attachmentsByChat.get(currentChatId) || [];
    }

    function setActiveAttachments(nextAttachments) {
      const normalized = Array.isArray(nextAttachments)
        ? nextAttachments.map((x) => String(x || '').trim()).filter(Boolean)
        : [];
      if (!currentChatId) {
        draftAttachments = normalized;
        return;
      }
      attachmentsByChat.set(currentChatId, normalized);
    }

    function renderAttachments() {
      const items = getActiveAttachments();
      if (!items.length) {
        attachedDocs.innerHTML = '';
        return;
      }

      attachedDocs.innerHTML = items
        .map((name, idx) => {
          const safe = escapeHtml(name);
          return `<span class="attached-chip"><span class="attached-chip-name">${safe}</span><button class="attached-chip-remove" data-idx="${idx}" title="Remove attachment">x</button></span>`;
        })
        .join('');

      attachedDocs.querySelectorAll('.attached-chip-remove').forEach((btn) => {
        btn.addEventListener('click', () => {
          const i = Number(btn.dataset.idx);
          const next = getActiveAttachments().slice();
          next.splice(i, 1);
          setActiveAttachments(next);
          renderAttachments();
        });
      });
    }

    function mergeSessionAttachments(sessions) {
      const safeSessions = Array.isArray(sessions) ? sessions : [];
      safeSessions.forEach((session) => {
        const sid = String(session.id || '');
        if (!sid) return;
        const sources = [];
        const turns = Array.isArray(session.turns) ? session.turns : [];
        turns.forEach((turn) => {
          const tSources = Array.isArray(turn.sources) ? turn.sources : [];
          tSources.forEach((src) => {
            const s = String(src || '').trim();
            if (s && !sources.includes(s)) sources.push(s);
          });
        });
        attachmentsByChat.set(sid, sources);
      });
    }

    // ── Auto-resize textarea + Enter to send ──────────
    question.addEventListener('input', () => {
      question.style.height = 'auto';
      question.style.height = Math.min(question.scrollHeight, 140) + 'px';
    });
    question.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askBtn.click(); }
    });

    // ── Session sidebar ───────────────────────────────
    function renderSessions(sessions) {
      cachedSessions = sessions;
      if (!sessions.length) {
        sessionsList.innerHTML = '<div class="sessions-empty">No chats yet.</div>';
        return;
      }
      sessionsList.innerHTML = sessions.map((s) => {
        const title = escapeHtml(s.title || 'Untitled Chat');
        const active = s.id === currentChatId ? ' active' : '';
        return `<div class="session-tab${active}" data-sid="${escapeHtml(s.id)}" onclick="selectSession('${s.id.replaceAll("'","")}')">
          <div class="session-tab-title">${title}</div>
          <div class="session-tab-time">${timeAgo(s.updated_at)}</div>
        </div>`;
      }).join('');
    }

    function syncActiveSidebarTab() {
      document.querySelectorAll('.session-tab').forEach((el) => {
        el.classList.toggle('active', el.dataset.sid === currentChatId);
      });
    }

    // ── Chat thread rendering ─────────────────────────
    function turnHtml(t) {
      const sources = (t.sources || [])
        .map((s) => `<span class="source-tag">${escapeHtml(s)}</span>`).join('');
      const ms = t.model_response_ms ? `${escapeHtml(t.model||'')} · ${t.model_response_ms} ms` : '';
      const meta = (sources || ms)
        ? `<div class="bubble-meta">${sources}<span>${escapeHtml(ms)}</span></div>` : '';
      return `<div class="turn">
        <div class="bubble-q">${escapeHtml(t.question || '')}</div>
        <div class="bubble-a">${escapeHtml(t.answer || '')}</div>
        ${meta}
      </div>`;
    }

    function renderThread(session) {
      if (!session || !session.turns || !session.turns.length) {
        chatThread.innerHTML = `<div class="chat-empty">
          <div class="chat-empty-icon">💬</div>
          <div class="chat-empty-title">Session ready</div>
          <div class="chat-empty-hint">Ask your first question below.</div>
        </div>`;
        return;
      }
      chatThread.innerHTML = session.turns.map(turnHtml).join('');
      chatThread.scrollTop = chatThread.scrollHeight;
    }

    function appendThinkingBubble(q) {
      chatThread.querySelector('.chat-empty')?.remove();
      const div = document.createElement('div');
      div.className = 'turn';
      div.id = 'thinking-turn';
      div.innerHTML = `<div class="bubble-q">${escapeHtml(q)}</div>
        <div class="bubble-a thinking" id="thinking-bubble">Thinking…</div>`;
      chatThread.appendChild(div);
      chatThread.scrollTop = chatThread.scrollHeight;
    }

    function resolveThinkingBubble(turn) {
      const el = document.getElementById('thinking-turn');
      if (el) el.outerHTML = turnHtml(turn);
      chatThread.scrollTop = chatThread.scrollHeight;
    }

    async function animateThinkingBubble(turn) {
      const el = document.getElementById('thinking-turn');
      if (!el) {
        resolveThinkingBubble(turn);
        return;
      }

      const safeQ = escapeHtml(turn.question || '');
      el.innerHTML = `<div class="bubble-q">${safeQ}</div><div class="bubble-a" id="typing-bubble"></div>`;
      const typingEl = document.getElementById('typing-bubble');
      if (!typingEl) {
        resolveThinkingBubble(turn);
        return;
      }

      const fullText = String(turn.answer || '');
      const total = fullText.length;
      // Fast, lightweight typewriter effect for better conversational feel.
      for (let i = 0; i <= total; i += 3) {
        typingEl.textContent = fullText.slice(0, i);
        chatThread.scrollTop = chatThread.scrollHeight;
        await sleep(8);
      }

      resolveThinkingBubble(turn);
    }

    function failThinkingBubble(msg) {
      const el = document.getElementById('thinking-bubble');
      if (el) { el.textContent = 'Error: ' + msg; el.className = 'bubble-a error'; }
    }

    // ── Load history ──────────────────────────────────
    async function loadHistory({ background = false } = {}) {
      const reqId = ++historyRequestId;
      if (historyController) historyController.abort();
      historyController = new AbortController();

      try {
        const res = await fetch('/chat/history?limit_chats=20&limit_turns=50', { signal: historyController.signal });
        const data = await res.json();
        if (!res.ok || reqId !== historyRequestId) return;

        const sessions = data.sessions || [];
        renderSessions(sessions);
        mergeSessionAttachments(sessions);

        if (currentChatId) {
          const s = sessions.find((x) => x.id === currentChatId);
          if (s) {
            mainTitle.textContent = s.title || 'Untitled Chat';
            if (!suppressThreadRender) renderThread(s);
            renderAttachments();
          }
        }
      } catch (err) {
        if (err.name === 'AbortError') return;
        if (!background) sessionsList.innerHTML = `<div class="sessions-empty">Error: ${escapeHtml(err.message)}</div>`;
      } finally {
        if (reqId === historyRequestId) historyController = null;
        suppressThreadRender = false;
      }
    }

    // ── Select session ────────────────────────────────
    function selectSession(sessionId) {
      currentChatId = sessionId;
      syncActiveSidebarTab();
      const s = cachedSessions.find((x) => x.id === sessionId);
      if (s) {
        mainTitle.textContent = s.title || 'Untitled Chat';
        mainMeta.textContent = '';
        renderThread(s);
        renderAttachments();
      }
    }
    window.selectSession = selectSession;

    // ── New Chat ──────────────────────────────────────
    newChatBtn.addEventListener('click', () => {
      currentChatId = null;
      syncActiveSidebarTab();
      mainTitle.textContent = 'New Chat';
      mainMeta.textContent = '';
      question.value = '';
      question.style.height = 'auto';
      draftAttachments = [];
      uploadStatus.textContent = '';
      uploadStatus.className = 'upload-status';
      renderAttachments();
      chatThread.innerHTML = `<div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-title">New chat</div>
        <div class="chat-empty-hint">Ask your first question below.</div>
      </div>`;
    });

    // ── Upload ────────────────────────────────────────
    docFile.addEventListener('change', async () => {
      if (uploadPending) return;
      if (!docFile.files.length) {
        uploadStatus.className = 'upload-status err';
        uploadStatus.textContent = 'Select a file first.';
        return;
      }
      const fd = new FormData();
      fd.append('file', docFile.files[0]);
      uploadStatus.className = 'upload-status';
      uploadStatus.textContent = 'Uploading and indexing...';
      uploadPending = true;
      setBusy(attachBtn, true, 'Uploading...', 'Attach Document');
      try {
        const d = await fetchJson('/upload', { method: 'POST', body: fd }, 300000);
        const reuse = d.reused_existing_index ? ' (reused existing index)' : '';

        if (d.reused_existing_index) {
          const reset = d.index_reset_message ? `\n⚠ ${d.index_reset_message}` : '';
          uploadStatus.className = 'upload-status ok';
          uploadStatus.textContent =
            `Attached ${d.file}${reuse}`;
          const next = getActiveAttachments().slice();
          if (d.file && !next.includes(d.file)) next.push(d.file);
          setActiveAttachments(next);
          renderAttachments();
          return;
        }

        if (!d.job_id) {
          throw new Error('Upload job was not created.');
        }

        uploadStatus.textContent = 'Upload saved. Waiting for indexing job…';

        while (true) {
          await sleep(2000);
          const job = await fetchJson(`/upload/jobs/${d.job_id}`, {}, 15000);

          if (job.status === 'queued' || job.status === 'running') {
            uploadStatus.className = 'upload-status';
            uploadStatus.textContent = job.message || `Indexing ${d.file}…`;
            continue;
          }

          if (job.status === 'failed') {
            throw new Error(job.message || 'Indexing failed.');
          }

          if (job.status === 'completed') {
            const result = job.result || {};
            const doneReuse = result.reused_existing_index ? ' (reused existing index)' : '';
            const reset = result.index_reset_message ? `\n⚠ ${result.index_reset_message}` : '';
            uploadStatus.className = 'upload-status ok';
            uploadStatus.textContent =
              `Attached ${result.file || d.file}${doneReuse}`;
            const attachedName = result.file || d.file || '';
            const next = getActiveAttachments().slice();
            if (attachedName && !next.includes(attachedName)) next.push(attachedName);
            setActiveAttachments(next);
            renderAttachments();
            break;
          }
        }
      } catch (err) {
        uploadStatus.className = 'upload-status err';
        uploadStatus.textContent = '✗ ' + err.message;
      } finally {
        uploadPending = false;
        setBusy(attachBtn, false, 'Uploading...', 'Attach Document');
        docFile.value = '';
      }
    });

    // ── Ask ───────────────────────────────────────────
    askBtn.addEventListener('click', async () => {
      if (chatPending) return;
      const q = question.value.trim();
      if (!q) return;

      appendThinkingBubble(q);
      question.value = '';
      question.style.height = 'auto';
      chatPending = true;
      setBusy(askBtn, true, 'Asking…', 'Ask');

      try {
        const d = await fetchJson('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: q,
            chat_id: currentChatId,
            model: modelSelect.value || defaultModel,
            source_filters: getActiveAttachments(),
          }),
        }, 480000);

        const oldChatId = currentChatId;
        currentChatId = d.chat_id || currentChatId;
        if (!oldChatId && currentChatId && draftAttachments.length) {
          attachmentsByChat.set(currentChatId, draftAttachments.slice());
          draftAttachments = [];
        }
        mainMeta.textContent = `${d.model} · ${d.model_response_ms} ms`;
        await animateThinkingBubble({ question: q, answer: d.answer, sources: d.sources || [], model: d.model, model_response_ms: d.model_response_ms });

        suppressThreadRender = true;
        loadHistory({ background: true });
      } catch (err) {
        failThinkingBubble(err.message);
      } finally {
        chatPending = false;
        setBusy(askBtn, false, 'Asking…', 'Ask');
      }
    });

    // ── Clear history ─────────────────────────────────
    clearHistoryBtn.addEventListener('click', async () => {
      if (!confirm('Delete all chat history?')) return;
      try {
        await fetchJson('/chat/history', { method: 'DELETE' });
        currentChatId = null;
        cachedSessions = [];
        attachmentsByChat.clear();
        draftAttachments = [];
        renderSessions([]);
        renderAttachments();
        mainTitle.textContent = 'New Chat';
        mainMeta.textContent = '';
        chatThread.innerHTML = `<div class="chat-empty">
          <div class="chat-empty-icon">💬</div>
          <div class="chat-empty-title">History cleared</div>
          <div class="chat-empty-hint">Start a new chat below.</div>
        </div>`;
      } catch (err) {
        alert('Failed to clear: ' + err.message);
      }
    });

    // ── Refresh ───────────────────────────────────────
    refreshBtn.addEventListener('click', () => loadHistory());

    // ── Init ──────────────────────────────────────────
    if ('requestIdleCallback' in window) {
      loadModelOptions();
      renderAttachments();
      window.requestIdleCallback(() => loadHistory({ background: true }));
    } else {
      loadModelOptions();
      renderAttachments();
      window.setTimeout(() => loadHistory({ background: true }), 0);
    }
  </script>
</body>
</html>
